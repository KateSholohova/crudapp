version: '3.8'

services:
  web-server:
    image: ${DOCKER_HUB_USER}/website-app:${BUILD_NUMBER}
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/dorm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ydurada
    deploy:
      replicas: 1

  db:
    image: ${DOCKER_HUB_USER}/website-mysql:${BUILD_NUMBER}
    environment:
      MYSQL_ROOT_PASSWORD: ydurada
      MYSQL_DATABASE: dorm
    deploy:
      replicas: 1
