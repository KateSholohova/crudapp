version: '3.8'

services:

  mysql:
    image: katesholohova/website-mysql:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ydurada
      MYSQL_DATABASE: dorm
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  app:
    image: katesholohova/website-app:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dorm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ydurada
    networks:
      - app_net
    deploy:
      replicas: 2
      restart_policy:
        condition: any

volumes:
  mysql-data:

networks:
  app_net:
    external: true
