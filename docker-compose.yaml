version: '3.8'

services:

  db:
    image: katesholohova/website-mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: ydurada
      MYSQL_DATABASE: dorm
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - jenkins_net
    deploy:
      replicas: 1

  web-server:
    image: katesholohova/website-app:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/dorm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ydurada
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - jenkins_net
    deploy:
      replicas: 2

volumes:
  mysql-data:

networks:
  jenkins_net:
    external: true
