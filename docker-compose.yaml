version: '3.8'

services:
  db:
    image: katesholohova/website-mysql:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ydurada
      MYSQL_DATABASE: dorm
    volumes:
      - mysql-data:/var/lib/mysql
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker

  web-server:
    image: katesholohova/website-app:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/dorm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ydurada
    depends_on:
      - db
    deploy:
      replicas: 3

volumes:
  mysql-data:
    driver: local
